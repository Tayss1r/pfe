# Pytest configuration file for E2E testing

[pytest]
# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    -ra

# Markers
markers =
    e2e: End-to-end tests
    security: Security-focused tests
    slow: Slow running tests
    smoke: Smoke tests for quick validation

# Timeout for tests (in seconds)
timeout = 300

# Playwright specific settings
# Browser to use for tests (can be chromium, firefox, or webkit)
# Set via command line: pytest --browser chromium
# Or via environment variable: BROWSER=firefox pytest

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (optional - install pytest-cov)
# addopts = --cov=web --cov-report=html --cov-report=term

# Parallel execution (optional - install pytest-xdist)
# addopts = -n auto

